name: Flutter Build IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # Checkout source
      - uses: actions/checkout@v4

      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Generate Flutter iOS helper files
      - run: flutter pub get
      - run: flutter precache --ios
      # This build step ensures ios/Flutter/podhelper.rb exists
      - run: flutter build ios --no-codesign

      # Install CocoaPods
      - run: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      # Build release IPA
      - run: flutter build ios --release --no-codesign

      # Package IPA
      - run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      # Upload artifact
      - uses: actions/upload-artifact@v4
        with:
          name: sideload-ipa
          path: app.ipa
