name: Flutter Build IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get
      - run: flutter precache --ios   # ✅ generates podhelper.rb

      - run: flutter build ios --no-codesign   # ✅ also generates helper files

      - run: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - run: flutter build ios --release --no-codesign

      - run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: sideload-ipa
          path: app.ipa
