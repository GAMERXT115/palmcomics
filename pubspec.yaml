name: palmcomics
description: A comic reader app for offline viewing.
publish_to: 'none'
version: 1.0.8+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  path_provider: ^2.1.1
  path: ^1.8.3
  cached_network_image: ^3.3.0
  permission_handler: ^11.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  open_file_plus: ^3.4.1+1
  archive: ^3.3.7
  photo_view: ^0.14.0
  firebase_core: ^3.1.1
  firebase_database: ^11.0.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  local_auth: ^2.2.0
  page_flip: ^0.2.5+1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
